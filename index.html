<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DRUM LIKE BARKER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #000; color: #fff; font-family: 'Courier New', monospace;
    overflow: hidden; height: 100vh; width: 100vw;
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  /* BLINK-182 STYLE MENU */
  #menu {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: #000; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100;
    text-align: center; padding: 15px; overflow-y: auto;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,20,147,0.03) 40px, rgba(255,20,147,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,20,147,0.03) 40px, rgba(255,20,147,0.03) 41px);
  }

  .blink-logo {
    font-family: 'Permanent Marker', cursive;
    font-size: 10vw; color: #ff1493; letter-spacing: -2px;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #ff1493, 0 0 30px #ff149366;
    transform: rotate(-2deg);
    margin-bottom: 0;
  }
  .blink-sub {
    font-family: 'Permanent Marker', cursive;
    font-size: 4vw; color: #fff; letter-spacing: 2px;
    transform: rotate(1deg);
    margin-bottom: 5px;
    text-shadow: 0 0 10px rgba(255,20,147,0.5);
  }
  .blink-ded {
    font-family: 'Permanent Marker', cursive;
    font-size: 5vw; color: #ffcc00; margin-bottom: 15px;
    transform: rotate(-1deg);
    text-shadow: 2px 2px 0 #000, 0 0 15px #ffcc0066;
  }
  /* Smiley arrow logo nod */
  .smiley { font-size: 8vw; margin-bottom: 5px; }

  .song-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; width: 88%; max-width: 360px; }
  .song-item {
    background: none; border: 2px solid #ff1493; color: #ff1493;
    font-family: 'Permanent Marker', cursive; font-size: 3.5vw;
    padding: 10px 14px; -webkit-appearance: none; border-radius: 0; cursor: pointer;
    text-align: left; letter-spacing: 1px;
    transition: all 0.15s;
  }
  .song-item:active, .song-item.sel {
    background: #ff1493; color: #000;
    box-shadow: 0 0 15px #ff149388;
  }
  .go-btn {
    background: #ff1493; border: none; color: #000;
    font-family: 'Permanent Marker', cursive; font-size: 6vw;
    padding: 12px 40px; letter-spacing: 4px; -webkit-appearance: none;
    border-radius: 0; cursor: pointer; margin-bottom: 8px;
    box-shadow: 4px 4px 0 #fff;
    transform: rotate(-1deg);
  }
  .go-btn:active { transform: rotate(-1deg) scale(0.95); box-shadow: 2px 2px 0 #fff; }
  .instructions {
    font-size: 2.5vw; color: #888; max-width: 320px; line-height: 1.5;
    margin-top: 8px;
  }
  .instructions strong { color: #ff1493; font-family: 'Permanent Marker', cursive; }

  /* PLAY SCREEN */
  #playScreen {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    flex-direction: column; background: #000;
  }

  /* Music player bar */
  #musicBar {
    height: auto; min-height: 60px; overflow: hidden; position: relative;
    background: #111; border-bottom: 2px solid #ff1493;
    padding: 6px 8px;
    display: flex; flex-direction: column; align-items: center;
  }
  #musicBar iframe {
    width: 100%; max-width: 400px; height: 52px; border: 0;
    border-radius: 8px; overflow: hidden;
  }
  #nowPlaying {
    font-family: 'Permanent Marker', cursive;
    font-size: 3vw; color: #ff1493; margin-top: 4px;
    text-shadow: 0 0 10px #ff149366;
  }
  #topBtns {
    position: absolute; top: 6px; right: 8px; z-index: 5;
  }
  .top-btn {
    background: #ff1493; border: none; color: #000;
    font-family: 'Permanent Marker', cursive; font-size: 2.5vw;
    padding: 4px 10px; -webkit-appearance: none; border-radius: 0; cursor: pointer;
    box-shadow: 2px 2px 0 #fff;
  }
  .top-btn:active { transform: scale(0.95); }

  /* Drum kit - Blink-182 punk style */
  #drumKit {
    flex: 1; display: grid; padding: 6px; gap: 5px;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    grid-template-areas:
      "crash ride hihat"
      "tom1  snare tom2"
      "kick  kick  kick";
    background:
      repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,20,147,0.02) 10px, rgba(255,20,147,0.02) 11px);
  }
  .drum {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; cursor: pointer; position: relative; overflow: hidden;
    transition: transform 0.05s;
    border: 3px solid;
  }
  .drum:active, .drum.hit { transform: scale(0.88); }
  .drum .name {
    font-family: 'Permanent Marker', cursive;
    font-size: 3.8vw; letter-spacing: 1px;
    text-shadow: 0 0 15px currentColor, 2px 2px 0 rgba(0,0,0,0.8);
    pointer-events: none; z-index: 2;
  }
  .drum .sub-name {
    font-size: 2vw; opacity: 0.5; pointer-events: none; z-index: 2;
    font-family: 'Permanent Marker', cursive;
  }
  .drum .flash {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.08s; pointer-events: none;
  }
  .drum.hit .flash { opacity: 1; }

  /* Blink punk colors */
  #crash { grid-area: crash; background: radial-gradient(circle, #332200, #0f0a00); color: #ffcc00; border-color: #ffcc00; }
  #ride  { grid-area: ride;  background: radial-gradient(circle, #2a2a0a, #0f0f00); color: #dddd33; border-color: #dddd33; }
  #hihat { grid-area: hihat; background: radial-gradient(circle, #002233, #000a11); color: #00d4ff; border-color: #00d4ff; }
  #tom1  { grid-area: tom1;  background: radial-gradient(circle, #1a0033, #080015); color: #aa44ff; border-color: #aa44ff; }
  #snare { grid-area: snare; background: radial-gradient(circle, #33001a, #150008); color: #ff1493; border-color: #ff1493;
           box-shadow: 0 0 20px #ff149344; }
  #tom2  { grid-area: tom2;  background: radial-gradient(circle, #002a00, #000f00); color: #00ff88; border-color: #00ff88; }
  #kick  { grid-area: kick;  background: radial-gradient(circle, #1a1a1a, #050505); color: #fff; border-color: #ff1493;
           border-radius: 20px; box-shadow: 0 0 15px #ff149322; }
</style>
</head>
<body>

<div id="menu">
  <div class="smiley">:)</div>
  <div class="blink-logo">DRUM LIKE BARKER</div>
  <div class="blink-sub">A BLINK-182 JAM SESSION</div>
  <div class="blink-ded">CAMERON - SHOW US WHAT YOU GOT</div>
  <div class="song-list">
    <button class="song-item sel" ontouchstart="pickSong(event,0)" onclick="pickSong(event,0)">ALL THE SMALL THINGS</button>
    <button class="song-item" ontouchstart="pickSong(event,1)" onclick="pickSong(event,1)">WHAT'S MY AGE AGAIN?</button>
    <button class="song-item" ontouchstart="pickSong(event,2)" onclick="pickSong(event,2)">DAMMIT</button>
    <button class="song-item" ontouchstart="pickSong(event,3)" onclick="pickSong(event,3)">FEELING THIS</button>
    <button class="song-item" ontouchstart="pickSong(event,4)" onclick="pickSong(event,4)">ONE MORE TIME</button>
  </div>
  <button class="go-btn" ontouchstart="startJam(event)" onclick="startJam(event)">LET'S GO!</button>
  <div class="instructions">
    <strong>HOW TO PLAY:</strong><br>
    1. Pick a song & hit GO<br>
    2. Press play on the Apple Music player<br>
    3. TAP THE DRUMS - you're Travis Barker!<br>
    4. Bring the beat! 🤘
  </div>
</div>

<div id="playScreen">
  <div id="musicBar">
    <div id="topBtns">
      <button class="top-btn" ontouchstart="goBack(event)" onclick="goBack(event)">✕ BACK</button>
    </div>
    <div id="applePlayer"></div>
    <div id="nowPlaying"></div>
  </div>
  <div id="drumKit">
    <div class="drum" id="crash" data-d="0"><div class="flash"></div><div class="name">CRASH</div></div>
    <div class="drum" id="ride"  data-d="1"><div class="flash"></div><div class="name">RIDE</div></div>
    <div class="drum" id="hihat" data-d="2"><div class="flash"></div><div class="name">HI-HAT</div></div>
    <div class="drum" id="tom1"  data-d="3"><div class="flash"></div><div class="name">TOM 1</div><div class="sub-name">HIGH</div></div>
    <div class="drum" id="snare" data-d="4"><div class="flash"></div><div class="name">SNARE</div></div>
    <div class="drum" id="tom2"  data-d="5"><div class="flash"></div><div class="name">TOM 2</div><div class="sub-name">LOW</div></div>
    <div class="drum" id="kick"  data-d="6"><div class="flash"></div><div class="name">KICK</div></div>
  </div>
</div>

<script>
(function() {
  var lastTap = 0;
  function noDouble(e) {
    if (e && e.type === 'touchstart') { e.preventDefault(); lastTap = Date.now(); return true; }
    if (e && e.type === 'click' && Date.now() - lastTap < 500) return false;
    return true;
  }

  // ==== AUDIO ====
  var actx = null;
  function getCtx() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
    if (actx && actx.state === 'suspended') actx.resume();
    return actx;
  }

  function playDrum(type) {
    var ctx = getCtx();
    if (!ctx) return;
    var now = ctx.currentTime;
    var g, osc, noise, buf, data, f, g2;

    if (type === 0) { // crash
      noise = ctx.createBufferSource();
      buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/data.length, 1.2) * 0.5;
      noise.buffer = buf; g = ctx.createGain(); g.gain.setValueAtTime(0.6, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.5);
      noise.connect(g); g.connect(ctx.destination); noise.start(now);
    } else if (type === 1) { // ride
      noise = ctx.createBufferSource();
      buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/data.length, 3) * 0.35;
      noise.buffer = buf; g = ctx.createGain(); g.gain.setValueAtTime(0.4, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.2);
      f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=4000;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start(now);
    } else if (type === 2) { // hihat
      noise = ctx.createBufferSource();
      buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/data.length, 6) * 0.5;
      noise.buffer = buf; g = ctx.createGain(); g.gain.setValueAtTime(0.5, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.05);
      f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=6000;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start(now);
    } else if (type === 3) { // tom hi
      osc = ctx.createOscillator(); osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(80, now+0.15);
      g = ctx.createGain(); g.gain.setValueAtTime(0.6, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.15);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+0.15);
    } else if (type === 4) { // snare
      noise = ctx.createBufferSource();
      buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/data.length, 3) * 0.7;
      noise.buffer = buf; g = ctx.createGain(); g.gain.setValueAtTime(0.8, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.12);
      f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=1500;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start(now);
      osc = ctx.createOscillator(); osc.frequency.setValueAtTime(180, now); osc.frequency.exponentialRampToValueAtTime(60, now+0.06);
      g2 = ctx.createGain(); g2.gain.setValueAtTime(0.4, now); g2.gain.exponentialRampToValueAtTime(0.001, now+0.06);
      osc.connect(g2); g2.connect(ctx.destination); osc.start(now); osc.stop(now+0.06);
    } else if (type === 5) { // tom lo
      osc = ctx.createOscillator(); osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(50, now+0.2);
      g = ctx.createGain(); g.gain.setValueAtTime(0.6, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.2);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+0.2);
    } else { // kick
      osc = ctx.createOscillator(); osc.frequency.setValueAtTime(160, now); osc.frequency.exponentialRampToValueAtTime(30, now+0.15);
      g = ctx.createGain(); g.gain.setValueAtTime(1.0, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.2);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+0.2);
      noise = ctx.createBufferSource();
      buf = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/data.length, 10) * 0.3;
      noise.buffer = buf; g2 = ctx.createGain(); g2.gain.setValueAtTime(0.3, now); g2.gain.exponentialRampToValueAtTime(0.001, now+0.02);
      noise.connect(g2); g2.connect(ctx.destination); noise.start(now);
    }
  }

  // ==== SONGS ====
  var songs = [
    { name: "ALL THE SMALL THINGS", embedId: "1444118647" },
    { name: "WHAT'S MY AGE AGAIN?", embedId: "1471266333" },
    { name: "DAMMIT", embedId: "1440844817" },
    { name: "FEELING THIS", embedId: "1747347157" },
    { name: "ONE MORE TIME", embedId: "1713622849" }
  ];

  var curSong = 0;

  window.pickSong = function(e, idx) {
    if (!noDouble(e)) return;
    playDrum(2);
    var btns = document.querySelectorAll('.song-item');
    for (var i = 0; i < btns.length; i++) btns[i].className = 'song-item';
    btns[idx].className = 'song-item sel';
    curSong = idx;
  };

  window.startJam = function(e) {
    if (!noDouble(e)) return;
    playDrum(0);
    var song = songs[curSong];

    // Embed Apple Music player
    document.getElementById('applePlayer').innerHTML =
      '<iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" ' +
      'sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" ' +
      'src="https://embed.music.apple.com/us/song/' + song.embedId + '?theme=dark" ' +
      'style="width:100%;max-width:400px;height:52px;border:0;border-radius:8px;overflow:hidden;background:transparent;"></iframe>';

    document.getElementById('nowPlaying').textContent = '▶ ' + song.name + ' — HIT PLAY & DRUM ALONG!';
    document.getElementById('menu').style.display = 'none';
    document.getElementById('playScreen').style.display = 'flex';
  };

  window.goBack = function(e) {
    if (!noDouble(e)) return;
    document.getElementById('applePlayer').innerHTML = '';
    document.getElementById('playScreen').style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
  };

  // ==== DRUM TAPS ====
  var drums = document.querySelectorAll('.drum');
  for (var i = 0; i < drums.length; i++) {
    (function(el) {
      var dt = parseInt(el.getAttribute('data-d'));
      el.addEventListener('touchstart', function(e) {
        e.preventDefault(); e.stopPropagation(); hitDrum(el, dt);
      }, { passive: false });
      el.addEventListener('mousedown', function(e) {
        e.preventDefault(); hitDrum(el, dt);
      });
    })(drums[i]);
  }

  function hitDrum(el, type) {
    playDrum(type);
    el.classList.add('hit');
    setTimeout(function() { el.classList.remove('hit'); }, 100);
  }

  // Keyboard
  var keyMap = {'a':0,'s':1,'d':2,'f':3,'g':4,'h':5,' ':6};
  document.addEventListener('keydown', function(e) {
    var t = keyMap[e.key.toLowerCase()];
    if (t !== undefined) { e.preventDefault(); hitDrum(document.querySelector('[data-d="'+t+'"]'), t); }
  });
})();
</script>
</body>
</html>
