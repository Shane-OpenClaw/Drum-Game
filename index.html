<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DRUM LIKE BARKER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace;
    overflow: hidden; height: 100vh; width: 100vw;
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  #startScreen {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: #0a0a0a; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100;
    text-align: center; padding: 20px;
  }
  #startScreen h1 {
    font-size: 7vw; color: #ff1493;
    text-shadow: 0 0 20px #ff1493, 0 0 40px #ff1493;
    margin-bottom: 10px; letter-spacing: 4px;
  }
  .subtitle { font-size: 3.5vw; color: #00d4ff; margin-bottom: 30px; text-shadow: 0 0 10px #00d4ff; }
  .dedication { font-size: 4vw; color: #ffcc00; margin-bottom: 30px; text-shadow: 0 0 10px #ffcc00; }
  .start-btn {
    background: none; border: 2px solid #ff1493; color: #ff1493;
    font-family: 'Courier New', monospace; font-size: 5vw;
    padding: 15px 40px; letter-spacing: 3px; text-transform: uppercase;
    display: block; margin: 8px auto; -webkit-appearance: none; border-radius: 0;
    cursor: pointer;
  }
  .start-btn:active { background: #ff1493; color: #000; }
  .song-select { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
  .song-btn {
    background: none; border: 1px solid #00d4ff; color: #00d4ff;
    font-family: 'Courier New', monospace; font-size: 3.5vw;
    padding: 12px 24px; -webkit-appearance: none; border-radius: 0;
    cursor: pointer;
  }
  .song-btn:active, .song-btn.selected { background: #00d4ff; color: #000; }
  #gameArea {
    display: none; width: 100%; height: 100vh; position: relative; overflow: hidden;
  }
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    z-index: 10; font-size: 3.5vw;
  }
  #score { color: #ff1493; text-shadow: 0 0 10px #ff1493; }
  #combo { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
  #songTitle { color: #ffcc00; font-size: 2.5vw; text-shadow: 0 0 10px #ffcc00; }
  #multiplier { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
  canvas { display: block; width: 100%; height: 100%; }
  #feedbackText {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    font-size: 8vw; font-weight: bold; z-index: 20; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; text-shadow: 0 0 20px currentColor;
  }
  #endScreen {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(10,10,10,0.95); display: none; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100;
    text-align: center; padding: 20px;
  }
  #endScreen h2 { font-size: 6vw; color: #ff1493; text-shadow: 0 0 20px #ff1493; margin-bottom: 15px; }
  .stat { font-size: 3.5vw; margin: 8px 0; }
  .stat-val { color: #00d4ff; }
  #grade { font-size: 15vw; margin: 20px 0; text-shadow: 0 0 30px currentColor; }
  .touch-lanes {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; z-index: 8;
  }
  .touch-lane {
    flex: 1; display: flex; align-items: flex-end; justify-content: center;
    border-left: 1px solid rgba(255,255,255,0.08);
    padding-bottom: 3vh;
  }
  .touch-lane:first-child { border-left: none; }
  .touch-lane.pressed { background: rgba(255,255,255,0.1); }
  .key-hint { font-size: 2.5vw; opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>

<div id="startScreen">
  <h1>DRUM LIKE BARKER</h1>
  <div class="subtitle">A BLINK-182 DRUMMING GAME</div>
  <div class="dedication">YO CAMERON - CAN YOU KEEP UP?</div>
  <div class="song-select">
    <button class="song-btn selected" ontouchstart="selectSong(event,0)" onclick="selectSong(event,0)">ALL THE SMALL THINGS</button>
    <button class="song-btn" ontouchstart="selectSong(event,1)" onclick="selectSong(event,1)">WHAT'S MY AGE AGAIN?</button>
    <button class="song-btn" ontouchstart="selectSong(event,2)" onclick="selectSong(event,2)">DAMMIT</button>
    <button class="song-btn" ontouchstart="selectSong(event,3)" onclick="selectSong(event,3)">FEELING THIS</button>
    <button class="song-btn" ontouchstart="selectSong(event,4)" onclick="selectSong(event,4)">ONE MORE TIME</button>
  </div>
  <button class="start-btn" ontouchstart="startGame(event)" onclick="startGame(event)">PLAY</button>
  <div style="margin-top:20px;font-size:12px;color:#666;">TAP THE COLUMN WHEN A NOTE REACHES THE LINE</div>
</div>

<div id="gameArea">
  <div id="hud">
    <span id="score">0</span>
    <span id="songTitle"></span>
    <span id="combo">0x</span>
    <span id="multiplier">x1</span>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="feedbackText"></div>
  <div class="touch-lanes" id="touchLanes">
    <div class="touch-lane" data-lane="0"><span class="key-hint" style="color:#ff1493">SNARE</span></div>
    <div class="touch-lane" data-lane="1"><span class="key-hint" style="color:#00d4ff">HI-HAT</span></div>
    <div class="touch-lane" data-lane="2"><span class="key-hint" style="color:#00ff88">TOM</span></div>
    <div class="touch-lane" data-lane="3"><span class="key-hint" style="color:#ffcc00">CRASH</span></div>
  </div>
</div>

<div id="endScreen">
  <h2>SONG COMPLETE!</h2>
  <div id="grade"></div>
  <div class="stat">SCORE: <span class="stat-val" id="finalScore"></span></div>
  <div class="stat">MAX COMBO: <span class="stat-val" id="finalCombo"></span></div>
  <div class="stat">PERFECT: <span class="stat-val" id="perfectCount"></span></div>
  <div class="stat">GOOD: <span class="stat-val" id="goodCount"></span></div>
  <div class="stat">MISS: <span class="stat-val" id="missCount"></span></div>
  <div class="stat">ACCURACY: <span class="stat-val" id="accuracy"></span></div>
  <div style="margin-top:20px;">
    <button class="start-btn" ontouchstart="startGame(event)" onclick="startGame(event)">REPLAY</button>
    <button class="start-btn" ontouchstart="goToMenu(event)" onclick="goToMenu(event)">MENU</button>
  </div>
</div>

<script>
(function() {
  var lastTap = 0;
  function isTap(e) {
    if (e && e.type === 'touchstart') {
      e.preventDefault();
      lastTap = Date.now();
      return true;
    }
    if (e && e.type === 'click' && Date.now() - lastTap < 500) return false;
    return true;
  }

  // AUDIO - init on first user touch of the whole page
  var audioCtx = null;

  // Called directly inside every user tap handler
  function ensureAudio() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    } catch(e) {}
  }

  function playDrumSound(type) {
    ensureAudio();
    if (!audioCtx) return;
    var now = audioCtx.currentTime;
    var noise, buf, data, g, f, osc, og;

    if (type === 0) { // snare
      noise = audioCtx.createBufferSource();
      buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
      data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
      noise.buffer = buf;
      g = audioCtx.createGain(); g.gain.setValueAtTime(0.8, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1000;
      noise.connect(f); f.connect(g); g.connect(audioCtx.destination); noise.start(now);
      osc = audioCtx.createOscillator(); osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.08);
      og = audioCtx.createGain(); og.gain.setValueAtTime(0.5, now); og.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(og); og.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.08);
    } else if (type === 1) { // hi-hat
      noise = audioCtx.createBufferSource();
      buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
      data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 5);
      noise.buffer = buf;
      g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 5000;
      noise.connect(f); f.connect(g); g.connect(audioCtx.destination); noise.start(now);
    } else if (type === 2) { // tom
      osc = audioCtx.createOscillator(); osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
      g = audioCtx.createGain(); g.gain.setValueAtTime(0.7, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.connect(g); g.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.2);
    } else { // crash
      noise = audioCtx.createBufferSource();
      buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
      data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.5);
      noise.buffer = buf;
      g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 3000; f.Q.value = 0.5;
      noise.connect(f); f.connect(g); g.connect(audioCtx.destination); noise.start(now);
    }
  }

  function generateSong(idx) {
    var notes = [], bpm, duration, beat, t;

    if (idx === 0) { // All The Small Things
      bpm = 80; beat = 60000 / bpm; duration = 40000;
      for (t = 3000; t < 10000; t += beat * 2) { notes.push([t, 1]); }
      for (t = 10000; t < 22000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      for (t = 22000; t < 34000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      for (t = 22000; t < 34000; t += beat * 8) { notes.push([t, 3]); }
      for (t = 34000; t < duration; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 2]); }
      return { notes: notes, duration: duration, name: "ALL THE SMALL THINGS", bpm: bpm };
    }
    if (idx === 1) { // What's My Age Again
      bpm = 85; beat = 60000 / bpm; duration = 38000;
      for (t = 2000; t < 12000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      for (t = 12000; t < 26000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      for (t = 12000; t < 26000; t += beat * 8) { notes.push([t, 3]); }
      for (t = 26000; t < 32000; t += beat * 2) { notes.push([t, 2]); notes.push([t + beat, 0]); }
      for (t = 32000; t < duration; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      return { notes: notes, duration: duration, name: "WHAT'S MY AGE AGAIN?", bpm: bpm };
    }
    if (idx === 2) { // Dammit
      bpm = 90; beat = 60000 / bpm; duration = 36000;
      for (t = 2000; t < 10000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      for (t = 10000; t < 22000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      for (t = 10000; t < 22000; t += beat * 8) { notes.push([t, 3]); }
      for (t = 22000; t < 28000; t += beat * 2) { notes.push([t, 0]); notes.push([t + beat, 2]); }
      notes.push([28000, 3]);
      for (t = 28000; t < duration; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      return { notes: notes, duration: duration, name: "DAMMIT", bpm: bpm };
    }
    if (idx === 3) { // Feeling This
      bpm = 85; beat = 60000 / bpm; duration = 40000;
      for (t = 1000; t < 4000; t += beat * 2) { notes.push([t, 2]); }
      notes.push([4500, 3]);
      for (t = 5000; t < 16000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      for (t = 16000; t < 28000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      for (t = 16000; t < 28000; t += beat * 8) { notes.push([t, 3]); }
      notes.push([28000, 0]); notes.push([28000 + beat, 2]); notes.push([28000 + beat * 2, 1]); notes.push([28000 + beat * 3, 3]);
      for (t = 32000; t < duration; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
      return { notes: notes, duration: duration, name: "FEELING THIS", bpm: bpm };
    }
    // ONE MORE TIME
    bpm = 75; beat = 60000 / bpm; duration = 44000;
    for (t = 3000; t < 10000; t += beat * 2) { notes.push([t, 1]); }
    notes.push([10000, 3]);
    for (t = 10500; t < 22000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
    for (t = 22000; t < 26000; t += beat * 2) { notes.push([t, 2]); notes.push([t + beat, 0]); }
    notes.push([26000, 3]);
    for (t = 26500; t < 36000; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
    for (t = 26500; t < 36000; t += beat * 8) { notes.push([t, 3]); }
    for (t = 36000; t < 40000; t += beat * 2) { notes.push([t, 0]); }
    for (t = 40000; t < duration; t += beat * 2) { notes.push([t, 1]); notes.push([t + beat, 0]); }
    return { notes: notes, duration: duration, name: "ONE MORE TIME", bpm: bpm };
  }

  var state = {
    score: 0, combo: 0, maxCombo: 0, multiplier: 1,
    perfects: 0, goods: 0, misses: 0,
    activeNotes: [], songTime: 0,
    running: false, startTime: 0, songData: null,
    selectedSong: 0
  };

  var LANE_COLORS = ['#ff1493', '#00d4ff', '#00ff88', '#ffcc00'];
  // Super generous - if the note is anywhere visible on screen, you can hit it
  var PERFECT_WINDOW = 400;
  var GOOD_WINDOW = 800;
  var MISS_WINDOW = 1200;
  var NOTE_SPEED = 0.12;
  var HIT_Y_RATIO = 0.82;

  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var W, H, laneW;
  var particles = [];
  var feedbackTimer = null;

  function resize() {
    var dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    laneW = W / 4;
  }
  window.addEventListener('resize', resize);
  resize();

  window.selectSong = function(e, idx) {
    if (!isTap(e)) return;
    ensureAudio();
    var btns = document.querySelectorAll('.song-btn');
    for (var i = 0; i < btns.length; i++) btns[i].className = 'song-btn';
    btns[idx].className = 'song-btn selected';
    state.selectedSong = idx;
  };

  window.startGame = function(e) {
    if (!isTap(e)) return;
    ensureAudio();
    state.songData = generateSong(state.selectedSong);
    state.score = 0; state.combo = 0; state.maxCombo = 0; state.multiplier = 1;
    state.perfects = 0; state.goods = 0; state.misses = 0;
    state.activeNotes = [];
    for (var i = 0; i < state.songData.notes.length; i++) {
      var n = state.songData.notes[i];
      state.activeNotes.push({ time: n[0], lane: n[1], hit: false, missed: false });
    }
    state.running = true;
    state.startTime = performance.now();
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('endScreen').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('songTitle').textContent = state.songData.name;
    resize();
    requestAnimationFrame(gameLoop);
  };

  window.goToMenu = function(e) {
    if (!isTap(e)) return;
    document.getElementById('endScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
    document.getElementById('gameArea').style.display = 'none';
  };

  function gameLoop(ts) {
    if (!state.running) return;
    state.songTime = ts - state.startTime;

    if (state.songTime > state.songData.duration + 2000) { endGame(); return; }

    for (var i = 0; i < state.activeNotes.length; i++) {
      var n = state.activeNotes[i];
      if (!n.hit && !n.missed && state.songTime > n.time + MISS_WINDOW) {
        n.missed = true; state.misses++; state.combo = 0; state.multiplier = 1;
        showFeedback('MISS', '#ff4444');
      }
    }

    document.getElementById('score').textContent = state.score.toLocaleString();
    document.getElementById('combo').textContent = state.combo + 'x';
    document.getElementById('multiplier').textContent = 'x' + state.multiplier;

    ctx.clearRect(0, 0, W, H);
    var hitY = H * HIT_Y_RATIO;

    // Lane dividers
    for (var i = 1; i < 4; i++) {
      ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(i * laneW, 0); ctx.lineTo(i * laneW, H); ctx.stroke();
    }

    // HIT LINE - thick and glowing
    ctx.save();
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 15;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, hitY); ctx.lineTo(W, hitY); ctx.stroke();
    ctx.restore();

    // Label the hit line
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px Courier New';
    ctx.fillText('TAP HERE', 5, hitY - 8);

    // Notes - BIG
    for (var i = 0; i < state.activeNotes.length; i++) {
      var n = state.activeNotes[i];
      if (n.hit || n.missed) continue;
      var dt = n.time - state.songTime;
      var y = hitY - dt * NOTE_SPEED;
      if (y < -60 || y > H + 60) continue;
      var x = n.lane * laneW + laneW / 2;
      var r = Math.min(laneW * 0.38, 36);
      var col = LANE_COLORS[n.lane];

      // Glow
      ctx.save();
      ctx.shadowColor = col;
      ctx.shadowBlur = 20;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = col; ctx.fill();
      ctx.restore();

      // Border
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();

      // Inner highlight
      ctx.beginPath(); ctx.arc(x, y, r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fill();
    }

    drawParticles();
    requestAnimationFrame(gameLoop);
  }

  function spawnParticles(x, y, color) {
    for (var i = 0; i < 15; i++) {
      var angle = (Math.PI * 2 / 15) * i + Math.random() * 0.3;
      var speed = 3 + Math.random() * 5;
      particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color: color, size: 3 + Math.random() * 4 });
    }
  }

  function drawParticles() {
    var alive = [];
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life -= 0.025;
      if (p.life <= 0) continue;
      ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      ctx.globalAlpha = 1;
      alive.push(p);
    }
    particles = alive;
  }

  function showFeedback(text, color) {
    var el = document.getElementById('feedbackText');
    el.textContent = text; el.style.color = color; el.style.opacity = 1;
    clearTimeout(feedbackTimer);
    feedbackTimer = setTimeout(function() { el.style.opacity = 0; }, 400);
  }

  function hitLane(lane) {
    if (!state.running) return;
    playDrumSound(lane);

    // Flash the lane
    var lanes = document.querySelectorAll('.touch-lane');
    lanes[lane].className = 'touch-lane pressed';
    setTimeout(function() { lanes[lane].className = 'touch-lane'; }, 150);

    var hitY = H * HIT_Y_RATIO;

    // Find the NEXT unhit note in this lane - super generous matching
    var closest = null, closestDt = Infinity;
    for (var i = 0; i < state.activeNotes.length; i++) {
      var n = state.activeNotes[i];
      if (n.lane !== lane || n.hit || n.missed) continue;
      var dt = n.time - state.songTime; // positive = note hasn't reached line yet
      var absDt = Math.abs(dt);
      // Hit if within window OR if the note is visible on screen and approaching
      if (absDt < MISS_WINDOW || (dt > 0 && dt < 2000)) {
        if (absDt < closestDt) { closest = n; closestDt = absDt; }
      }
    }
    if (closest) {
      closest.hit = true;
      var noteY = hitY - (closest.time - state.songTime) * NOTE_SPEED;
      spawnParticles(lane * laneW + laneW / 2, noteY, LANE_COLORS[lane]);

      if (closestDt < PERFECT_WINDOW) {
        state.perfects++; state.score += 100 * state.multiplier; state.combo++;
        showFeedback('PERFECT!', '#00ff88');
      } else if (closestDt < GOOD_WINDOW) {
        state.goods++; state.score += 50 * state.multiplier; state.combo++;
        showFeedback('GOOD', '#00d4ff');
      } else {
        state.goods++; state.score += 25 * state.multiplier; state.combo++;
        showFeedback('OK', '#ffcc00');
      }
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      if (state.combo >= 40) state.multiplier = 4;
      else if (state.combo >= 20) state.multiplier = 3;
      else if (state.combo >= 10) state.multiplier = 2;
      else state.multiplier = 1;
    }
  }

  // Keyboard
  document.addEventListener('keydown', function(e) {
    var map = { d: 0, f: 1, j: 2, k: 3 };
    var lane = map[e.key.toLowerCase()];
    if (lane !== undefined) { e.preventDefault(); hitLane(lane); }
  });

  // Touch lanes - full screen
  var lanes = document.querySelectorAll('.touch-lane');
  for (var i = 0; i < lanes.length; i++) {
    (function(el) {
      el.addEventListener('touchstart', function(e) {
        e.preventDefault();
        e.stopPropagation();
        hitLane(parseInt(el.getAttribute('data-lane')));
      }, { passive: false });
      el.addEventListener('mousedown', function(e) {
        e.preventDefault();
        hitLane(parseInt(el.getAttribute('data-lane')));
      });
    })(lanes[i]);
  }

  function endGame() {
    state.running = false;
    var total = state.perfects + state.goods + state.misses;
    var acc = total > 0 ? Math.round((state.perfects + state.goods) / total * 100) : 0;
    var grade, gradeColor;
    if (acc >= 95) { grade = 'S+'; gradeColor = '#ff1493'; }
    else if (acc >= 90) { grade = 'S'; gradeColor = '#ff1493'; }
    else if (acc >= 80) { grade = 'A'; gradeColor = '#00ff88'; }
    else if (acc >= 70) { grade = 'B'; gradeColor = '#00d4ff'; }
    else if (acc >= 60) { grade = 'C'; gradeColor = '#ffcc00'; }
    else { grade = 'D'; gradeColor = '#ff4444'; }
    document.getElementById('finalScore').textContent = state.score.toLocaleString();
    document.getElementById('finalCombo').textContent = state.maxCombo;
    document.getElementById('perfectCount').textContent = state.perfects;
    document.getElementById('goodCount').textContent = state.goods;
    document.getElementById('missCount').textContent = state.misses;
    document.getElementById('accuracy').textContent = acc + '%';
    var gradeEl = document.getElementById('grade');
    gradeEl.textContent = grade; gradeEl.style.color = gradeColor;
    document.getElementById('endScreen').style.display = 'flex';
  }
})();
</script>
</body>
</html>
