<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DRUM LIKE BARKER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace;
    overflow: hidden; height: 100vh; width: 100vw;
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  /* MENU */
  #menu {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0a0a; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100;
    text-align: center; padding: 20px;
  }
  #menu h1 {
    font-size: 7vw; color: #ff1493;
    text-shadow: 0 0 20px #ff1493, 0 0 40px #ff1493;
    margin-bottom: 5px; letter-spacing: 3px;
  }
  #menu .sub { font-size: 3vw; color: #00d4ff; margin-bottom: 8px; }
  #menu .ded { font-size: 3.5vw; color: #ffcc00; margin-bottom: 15px; }
  .song-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; width: 80%; max-width: 350px; }
  .song-item {
    background: none; border: 1px solid #00d4ff; color: #00d4ff;
    font-family: 'Courier New', monospace; font-size: 3.2vw;
    padding: 10px 16px; -webkit-appearance: none; border-radius: 0; cursor: pointer;
    text-align: left;
  }
  .song-item:active, .song-item.sel { background: #00d4ff; color: #000; }
  .go-btn {
    background: none; border: 2px solid #ff1493; color: #ff1493;
    font-family: 'Courier New', monospace; font-size: 5vw;
    padding: 12px 36px; letter-spacing: 3px; -webkit-appearance: none;
    border-radius: 0; cursor: pointer;
  }
  .go-btn:active { background: #ff1493; color: #000; }
  .hint { font-size: 2.5vw; color: #555; margin-top: 12px; }

  /* PLAY SCREEN */
  #playScreen {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    flex-direction: column; background: #0a0a0a;
  }

  /* Top: lyrics */
  #lyricsBar {
    height: 22vh; overflow: hidden; position: relative;
    background: linear-gradient(to bottom, #111, #0a0a0a);
    border-bottom: 1px solid #222;
    display: flex; flex-direction: column; justify-content: center;
    padding: 10px 15px;
  }
  #songName {
    font-size: 3vw; color: #ff1493; margin-bottom: 6px;
    text-shadow: 0 0 10px #ff1493;
  }
  #lyricLine {
    font-size: 4.5vw; color: #fff; min-height: 2.2em;
    line-height: 1.4; transition: opacity 0.3s;
  }
  #lyricNext {
    font-size: 3vw; color: #555; min-height: 1.5em; margin-top: 4px;
  }
  #backBtn {
    position: absolute; top: 8px; right: 12px;
    background: none; border: 1px solid #555; color: #555;
    font-family: 'Courier New', monospace; font-size: 2.5vw;
    padding: 4px 10px; -webkit-appearance: none; border-radius: 0; cursor: pointer;
  }

  /* Drum kit area */
  #drumKit {
    flex: 1; display: grid; padding: 8px; gap: 6px;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    grid-template-areas:
      "crash ride hihat"
      "tom1  snare tom2"
      "kick  kick  kick";
  }

  .drum {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform 0.05s;
    border: 3px solid rgba(255,255,255,0.2);
  }
  .drum:active, .drum.hit { transform: scale(0.92); }
  .drum .name {
    font-size: 3.5vw; font-weight: bold; letter-spacing: 1px;
    text-shadow: 0 0 10px currentColor;
    pointer-events: none; z-index: 2;
  }
  .drum .sub-name {
    font-size: 2vw; opacity: 0.6; pointer-events: none; z-index: 2;
  }
  .drum .flash {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.1s; pointer-events: none;
  }
  .drum.hit .flash { opacity: 1; }

  #crash  { grid-area: crash;  background: radial-gradient(circle, #4a3500 0%, #1a1200 100%); color: #ffcc00; border-color: #ffcc0044; }
  #ride   { grid-area: ride;   background: radial-gradient(circle, #3a3a15 0%, #151508 100%); color: #cccc44; border-color: #cccc4444; }
  #hihat  { grid-area: hihat;  background: radial-gradient(circle, #003344 0%, #001118 100%); color: #00d4ff; border-color: #00d4ff44; }
  #tom1   { grid-area: tom1;   background: radial-gradient(circle, #1a0033 0%, #0a0015 100%); color: #aa44ff; border-color: #aa44ff44; }
  #snare  { grid-area: snare;  background: radial-gradient(circle, #440020 0%, #1a000a 100%); color: #ff1493; border-color: #ff149344; }
  #tom2   { grid-area: tom2;   background: radial-gradient(circle, #002a00 0%, #000f00 100%); color: #00ff88; border-color: #00ff8844; }
  #kick   { grid-area: kick;   background: radial-gradient(circle, #1a1a1a 0%, #080808 100%); color: #ffffff; border-color: #ffffff22; border-radius: 20px; }
</style>
</head>
<body>

<div id="menu">
  <h1>DRUM LIKE BARKER</h1>
  <div class="sub">A BLINK-182 DRUMMING GAME</div>
  <div class="ded">YO CAMERON - CAN YOU KEEP UP?</div>
  <div class="song-list">
    <button class="song-item sel" data-s="0" ontouchstart="pickSong(event,0)" onclick="pickSong(event,0)">ALL THE SMALL THINGS</button>
    <button class="song-item" data-s="1" ontouchstart="pickSong(event,1)" onclick="pickSong(event,1)">WHAT'S MY AGE AGAIN?</button>
    <button class="song-item" data-s="2" ontouchstart="pickSong(event,2)" onclick="pickSong(event,2)">DAMMIT</button>
    <button class="song-item" data-s="3" ontouchstart="pickSong(event,3)" onclick="pickSong(event,3)">FEELING THIS</button>
    <button class="song-item" data-s="4" ontouchstart="pickSong(event,4)" onclick="pickSong(event,4)">ONE MORE TIME</button>
  </div>
  <button class="go-btn" ontouchstart="startJam(event)" onclick="startJam(event)">JAM</button>
  <div class="hint">TAP THE DRUMS AND PLAY ALONG</div>
</div>

<div id="playScreen">
  <div id="lyricsBar">
    <button id="backBtn" ontouchstart="goBack(event)" onclick="goBack(event)">BACK</button>
    <div id="songName"></div>
    <div id="lyricLine"></div>
    <div id="lyricNext"></div>
  </div>
  <div id="drumKit">
    <div class="drum" id="crash"  data-d="0"><div class="flash"></div><div class="name">CRASH</div></div>
    <div class="drum" id="ride"   data-d="1"><div class="flash"></div><div class="name">RIDE</div></div>
    <div class="drum" id="hihat"  data-d="2"><div class="flash"></div><div class="name">HI-HAT</div></div>
    <div class="drum" id="tom1"   data-d="3"><div class="flash"></div><div class="name">TOM 1</div><div class="sub-name">HIGH</div></div>
    <div class="drum" id="snare"  data-d="4"><div class="flash"></div><div class="name">SNARE</div></div>
    <div class="drum" id="tom2"   data-d="5"><div class="flash"></div><div class="name">TOM 2</div><div class="sub-name">LOW</div></div>
    <div class="drum" id="kick"   data-d="6"><div class="flash"></div><div class="name">KICK</div></div>
  </div>
</div>

<script>
(function() {
  var lastTap = 0;
  function noDouble(e) {
    if (e && e.type === 'touchstart') { e.preventDefault(); lastTap = Date.now(); return true; }
    if (e && e.type === 'click' && Date.now() - lastTap < 500) return false;
    return true;
  }

  // ---- AUDIO: generate WAV data URIs ----
  var sr = 22050;

  function toWav(samples) {
    var n = samples.length, buf = new ArrayBuffer(44 + n * 2), v = new DataView(buf);
    function ws(o, s) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
    ws(0,'RIFF'); v.setUint32(4, 36 + n * 2, true); ws(8,'WAVE'); ws(12,'fmt ');
    v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true);
    v.setUint16(32, 2, true); v.setUint16(34, 16, true);
    ws(36,'data'); v.setUint32(40, n * 2, true);
    for (var i = 0; i < n; i++) { var s = Math.max(-1, Math.min(1, samples[i])); v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true); }
    var bytes = new Uint8Array(buf), bin = '';
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return 'data:audio/wav;base64,' + btoa(bin);
  }

  // 7 drum sounds
  function makeCrash() {
    var len = sr * 0.5, out = new Float32Array(len);
    for (var i = 0; i < len; i++) out[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 1.2) * 0.6;
    return out;
  }
  function makeRide() {
    var len = sr * 0.3, out = new Float32Array(len);
    for (var i = 0; i < len; i++) out[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 2.5) * 0.4;
    return out;
  }
  function makeHihat() {
    var len = sr * 0.06, out = new Float32Array(len);
    for (var i = 0; i < len; i++) out[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 5) * 0.5;
    return out;
  }
  function makeTomHi() {
    var len = sr * 0.2, out = new Float32Array(len);
    for (var i = 0; i < len; i++) { var e = Math.pow(1 - i/len, 2); out[i] = Math.sin(2*Math.PI*(180 - 80*i/len)*i/sr) * e * 0.7; }
    return out;
  }
  function makeSnare() {
    var len = sr * 0.15, out = new Float32Array(len);
    for (var i = 0; i < len; i++) {
      var e = Math.pow(1 - i/len, 3);
      out[i] = ((Math.random() * 2 - 1) * 0.6 + Math.sin(2*Math.PI*180*i/sr) * 0.4) * e * 0.8;
    }
    return out;
  }
  function makeTomLo() {
    var len = sr * 0.25, out = new Float32Array(len);
    for (var i = 0; i < len; i++) { var e = Math.pow(1 - i/len, 2); out[i] = Math.sin(2*Math.PI*(110 - 60*i/len)*i/sr) * e * 0.7; }
    return out;
  }
  function makeKick() {
    var len = sr * 0.25, out = new Float32Array(len);
    for (var i = 0; i < len; i++) {
      var e = Math.pow(1 - i/len, 2);
      out[i] = Math.sin(2*Math.PI*(160 - 120*i/len)*i/sr) * e * 0.9;
    }
    return out;
  }

  var makers = [makeCrash, makeRide, makeHihat, makeTomHi, makeSnare, makeTomLo, makeKick];
  var wavs = [];
  for (var i = 0; i < makers.length; i++) wavs.push(toWav(makers[i]()));

  // Audio pools
  var pools = [], pIdx = [];
  for (var d = 0; d < 7; d++) {
    pools[d] = []; pIdx[d] = 0;
    for (var p = 0; p < 4; p++) {
      var a = new Audio(wavs[d]);
      a.preload = 'auto';
      pools[d].push(a);
    }
  }

  function playDrum(type) {
    try {
      var a = pools[type][pIdx[type]];
      a.currentTime = 0;
      a.play();
      pIdx[type] = (pIdx[type] + 1) % 4;
    } catch(e) {}
  }

  // ---- LYRICS ----
  var songs = [
    { name: "ALL THE SMALL THINGS", bpm: 148, lyrics: [
      [0, "All the small things"],
      [3000, "True care, truth brings"],
      [6000, "I'll take one lift"],
      [9000, "Your ride, best trip"],
      [12000, "Always, I know"],
      [15000, "You'll be at my show"],
      [18000, "Watching, waiting"],
      [21000, "Commiserating"],
      [24000, "Say it ain't so, I will not go"],
      [28000, "Turn the lights off, carry me home"],
      [32000, "Na-na, na-na, na-na, na-na, na-na"],
      [36000, "Na-na, na-na, na-na, na-na, na-na"],
      [40000, "Na-na, na-na, na-na, na-na, na-na"],
      [44000, "Na-na, na-na, na-na, na-na, na-na"],
      [48000, "Late night, come home"],
      [51000, "Work sucks, I know"],
      [54000, "She left me roses by the stairs"],
      [58000, "Surprises let me know she cares"],
      [62000, "Say it ain't so, I will not go"],
      [66000, "Turn the lights off, carry me home"],
      [70000, "Na-na, na-na, na-na, na-na, na-na"],
      [74000, "Na-na, na-na, na-na, na-na, na-na"],
      [78000, "Say it ain't so, I will not go"],
      [82000, "Turn the lights off, carry me home"],
      [86000, "Keep your head still, I'll be your thrill"],
      [90000, "The night will go on, my little windmill"],
      [94000, ""]
    ]},
    { name: "WHAT'S MY AGE AGAIN?", bpm: 160, lyrics: [
      [0, "I took her out, it was a Friday night"],
      [4000, "I wore cologne to get the feeling right"],
      [8000, "We started making out and she took off my pants"],
      [12000, "But then I turned on the TV"],
      [15000, "And that's about the time she walked away from me"],
      [19000, "Nobody likes you when you're twenty-three"],
      [23000, "And are still more amused by TV shows"],
      [27000, "What the hell is ADD?"],
      [30000, "My friends say I should act my age"],
      [34000, "What's my age again?"],
      [37000, "What's my age again?"],
      [40000, "Then later on, on the drive home"],
      [44000, "I called her mom from a pay phone"],
      [48000, "I said I was the cops"],
      [51000, "And your husband's in jail"],
      [54000, "This state looks down on sodomy"],
      [58000, "And that's about the time that bitch hung up on me"],
      [62000, "Nobody likes you when you're twenty-three"],
      [66000, "And are still more amused by prank phone calls"],
      [70000, "What the hell is caller ID?"],
      [74000, "My friends say I should act my age"],
      [78000, "What's my age again?"],
      [81000, "What's my age again?"],
      [84000, ""]
    ]},
    { name: "DAMMIT", bpm: 215, lyrics: [
      [0, "It's alright to tell me what you think about me"],
      [4000, "I won't try to argue or hold it against you"],
      [8000, "I know that you're leaving, you must have your reasons"],
      [12000, "The season is calling, your pictures are falling down"],
      [16000, "The steps that I retrace, the sad look on your face"],
      [20000, "The timing and structure, did you hear he fucked her?"],
      [24000, "Well I'll be damned"],
      [27000, "Well I'll be damned"],
      [30000, "And I guess this is growing up"],
      [34000, "And I guess this is growing up"],
      [38000, "And I guess this is growing up"],
      [42000, "Well I guess this is growing up"],
      [46000, "And I guess this is growing up"],
      [50000, "And I guess this is growing up"],
      [54000, ""]
    ]},
    { name: "FEELING THIS", bpm: 170, lyrics: [
      [0, "I got no regret right now, I'm feeling this"],
      [4000, "The air is so cold and low, I'm feeling this"],
      [8000, "Let me go in her room, I'm feeling this"],
      [12000, "I wanna take off her clothes"],
      [15000, "Show me the way to bed"],
      [18000, "Show me the way you move"],
      [21000, "Fastest thing that's on my mind"],
      [24000, "Fate fell short this time"],
      [27000, "Your smile fades in the summer"],
      [30000, "Place your hand in mine"],
      [33000, "I'll leave when I wanna"],
      [36000, "Where do we go from here?"],
      [39000, "Turn all the lights down now"],
      [42000, "Smiling from ear to ear"],
      [45000, "Are you feeling this?"],
      [48000, "Fate fell short this time"],
      [51000, "Your smile fades in the summer"],
      [54000, "Place your hand in mine"],
      [57000, "I'll leave when I wanna"],
      [60000, ""]
    ]},
    { name: "ONE MORE TIME", bpm: 138, lyrics: [
      [0, "I know there's somewhere out there for us"],
      [5000, "We've been through way too much to give up"],
      [10000, "Maybe we're damaged, maybe we're not"],
      [15000, "But I know I still believe in us"],
      [20000, "One more time, say you'll be mine"],
      [25000, "One more time, just close your eyes"],
      [30000, "We can make it if we try"],
      [35000, "One more time, one more time"],
      [40000, "I wanna make this moment last forever"],
      [45000, "I know that we can fight through any weather"],
      [50000, "One more time, say you'll be mine"],
      [55000, "One more time, just close your eyes"],
      [60000, "We can make it if we try"],
      [65000, "One more time"],
      [70000, ""]
    ]}
  ];

  var curSong = 0;
  var jamStart = 0;
  var jamRunning = false;
  var lyricIdx = 0;

  // ---- UI HANDLERS ----
  window.pickSong = function(e, idx) {
    if (!noDouble(e)) return;
    playDrum(2); // click sound
    var btns = document.querySelectorAll('.song-item');
    for (var i = 0; i < btns.length; i++) btns[i].className = 'song-item';
    btns[idx].className = 'song-item sel';
    curSong = idx;
  };

  window.startJam = function(e) {
    if (!noDouble(e)) return;
    playDrum(0); // crash to unlock audio
    document.getElementById('menu').style.display = 'none';
    document.getElementById('playScreen').style.display = 'flex';
    document.getElementById('songName').textContent = songs[curSong].name;
    lyricIdx = 0;
    jamStart = Date.now();
    jamRunning = true;
    updateLyrics();
  };

  window.goBack = function(e) {
    if (!noDouble(e)) return;
    jamRunning = false;
    document.getElementById('playScreen').style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
  };

  function updateLyrics() {
    if (!jamRunning) return;
    var elapsed = Date.now() - jamStart;
    var lyr = songs[curSong].lyrics;

    // Find current lyric
    while (lyricIdx < lyr.length - 1 && elapsed >= lyr[lyricIdx + 1][0]) {
      lyricIdx++;
    }

    document.getElementById('lyricLine').textContent = lyr[lyricIdx][1];
    if (lyricIdx + 1 < lyr.length && lyr[lyricIdx + 1][1]) {
      document.getElementById('lyricNext').textContent = lyr[lyricIdx + 1][1];
    } else {
      document.getElementById('lyricNext').textContent = '';
    }

    // Loop back if song ends
    if (lyricIdx >= lyr.length - 1 && elapsed > lyr[lyr.length - 1][0] + 3000) {
      jamStart = Date.now();
      lyricIdx = 0;
    }

    requestAnimationFrame(updateLyrics);
  }

  // ---- DRUM TAPS ----
  var drums = document.querySelectorAll('.drum');
  for (var i = 0; i < drums.length; i++) {
    (function(el) {
      var drumType = parseInt(el.getAttribute('data-d'));
      el.addEventListener('touchstart', function(e) {
        e.preventDefault();
        e.stopPropagation();
        hitDrum(el, drumType);
      }, { passive: false });
      el.addEventListener('mousedown', function(e) {
        e.preventDefault();
        hitDrum(el, drumType);
      });
    })(drums[i]);
  }

  function hitDrum(el, type) {
    playDrum(type);
    el.classList.add('hit');
    setTimeout(function() { el.classList.remove('hit'); }, 100);
  }

  // Keyboard support
  var keyMap = {
    'a': 0, 's': 1, 'd': 2, // crash, ride, hihat
    'f': 3, 'g': 4, 'h': 5, // tom1, snare, tom2
    ' ': 6 // kick = spacebar
  };
  document.addEventListener('keydown', function(e) {
    var type = keyMap[e.key.toLowerCase()];
    if (type !== undefined) {
      e.preventDefault();
      var el = document.querySelector('[data-d="' + type + '"]');
      hitDrum(el, type);
    }
  });

})();
</script>
</body>
</html>
