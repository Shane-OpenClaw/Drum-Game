<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DRUM LIKE BARKER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#000; color:#fff; font-family:'Courier New',monospace;
    overflow:hidden; height:100vh; width:100vw;
    touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }

  /* MENU */
  #menu {
    position:fixed; inset:0; background:#000; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:100; text-align:center; padding:15px;
    overflow-y:auto;
    background-image: repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,20,147,0.03) 40px,rgba(255,20,147,0.03) 41px),
      repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,20,147,0.03) 40px,rgba(255,20,147,0.03) 41px);
  }
  .smiley { font-size:8vw; margin-bottom:2px; }
  .blink-logo {
    font-family:'Permanent Marker',cursive; font-size:10vw; color:#ff1493; letter-spacing:-2px;
    text-shadow:3px 3px 0 #000,-1px -1px 0 #ff1493,0 0 30px #ff149366; transform:rotate(-2deg);
  }
  .blink-sub { font-family:'Permanent Marker',cursive; font-size:4vw; color:#fff; letter-spacing:2px; transform:rotate(1deg); margin-bottom:5px; }
  .blink-ded { font-family:'Permanent Marker',cursive; font-size:5vw; color:#ffcc00; margin-bottom:12px; transform:rotate(-1deg); text-shadow:2px 2px 0 #000; }
  .song-list { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; width:88%; max-width:360px; }
  .song-item {
    background:none; border:2px solid #ff1493; color:#ff1493;
    font-family:'Permanent Marker',cursive; font-size:3.5vw;
    padding:10px 14px; -webkit-appearance:none; border-radius:0; cursor:pointer;
    text-align:left; letter-spacing:1px; transition:all 0.15s;
  }
  .song-item:active,.song-item.sel { background:#ff1493; color:#000; box-shadow:0 0 15px #ff149388; }
  .go-btn {
    background:#ff1493; border:none; color:#000;
    font-family:'Permanent Marker',cursive; font-size:6vw;
    padding:12px 40px; letter-spacing:4px; -webkit-appearance:none;
    border-radius:0; cursor:pointer; box-shadow:4px 4px 0 #fff; transform:rotate(-1deg);
  }
  .go-btn:active { transform:rotate(-1deg) scale(0.95); box-shadow:2px 2px 0 #fff; }
  .instructions { font-size:2.5vw; color:#888; max-width:320px; line-height:1.5; margin-top:8px; }
  .instructions strong { color:#ff1493; font-family:'Permanent Marker',cursive; }

  /* PLAY SCREEN */
  #playScreen { display:none; position:fixed; inset:0; flex-direction:column; background:#000; }

  /* Top bar: lyrics + controls */
  #topBar {
    height:22vh; min-height:90px; position:relative;
    background:linear-gradient(to bottom,#111,#000);
    border-bottom:2px solid #ff1493;
    display:flex; flex-direction:column; justify-content:center;
    padding:8px 50px 8px 12px;
  }
  #songName { font-family:'Permanent Marker',cursive; font-size:3vw; color:#ff1493; text-shadow:0 0 10px #ff149366; }
  #lyricLine { font-family:'Permanent Marker',cursive; font-size:4.5vw; color:#fff; min-height:2em; line-height:1.3; margin-top:4px; transition:opacity 0.2s; }
  #lyricNext { font-size:2.5vw; color:#555; min-height:1.2em; margin-top:2px; }
  #topBtns { position:absolute; top:6px; right:8px; display:flex; gap:6px; }
  .top-btn {
    background:#ff1493; border:none; color:#000;
    font-family:'Permanent Marker',cursive; font-size:2.5vw;
    padding:4px 10px; -webkit-appearance:none; border-radius:0; cursor:pointer;
    box-shadow:2px 2px 0 #fff;
  }
  #musicStatus { position:absolute; bottom:4px; right:8px; font-family:'Permanent Marker',cursive; font-size:2vw; color:#00ff88; }

  /* Drum kit */
  #drumKit {
    flex:1; display:grid; padding:6px; gap:5px;
    grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr;
    grid-template-areas: "crash ride hihat" "tom1 snare tom2" "kick kick kick";
    background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,20,147,0.02) 10px,rgba(255,20,147,0.02) 11px);
  }
  .drum {
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    flex-direction:column; cursor:pointer; position:relative; overflow:hidden;
    transition:transform 0.05s; border:3px solid;
  }
  .drum:active,.drum.hit { transform:scale(0.88); }
  .drum .name { font-family:'Permanent Marker',cursive; font-size:3.8vw; letter-spacing:1px; text-shadow:0 0 15px currentColor,2px 2px 0 rgba(0,0,0,0.8); pointer-events:none; z-index:2; }
  .drum .sub-name { font-size:2vw; opacity:0.5; pointer-events:none; z-index:2; font-family:'Permanent Marker',cursive; }
  .drum .flash { position:absolute; inset:0; background:radial-gradient(circle,rgba(255,255,255,0.6) 0%,transparent 70%); opacity:0; transition:opacity 0.08s; pointer-events:none; }
  .drum.hit .flash { opacity:1; }
  #crash { grid-area:crash; background:radial-gradient(circle,#332200,#0f0a00); color:#ffcc00; border-color:#ffcc00; }
  #ride  { grid-area:ride;  background:radial-gradient(circle,#2a2a0a,#0f0f00); color:#dddd33; border-color:#dddd33; }
  #hihat { grid-area:hihat; background:radial-gradient(circle,#002233,#000a11); color:#00d4ff; border-color:#00d4ff; }
  #tom1  { grid-area:tom1;  background:radial-gradient(circle,#1a0033,#080015); color:#aa44ff; border-color:#aa44ff; }
  #snare { grid-area:snare; background:radial-gradient(circle,#33001a,#150008); color:#ff1493; border-color:#ff1493; box-shadow:0 0 20px #ff149344; }
  #tom2  { grid-area:tom2;  background:radial-gradient(circle,#002a00,#000f00); color:#00ff88; border-color:#00ff88; }
  #kick  { grid-area:kick;  background:radial-gradient(circle,#1a1a1a,#050505); color:#fff; border-color:#ff1493; border-radius:20px; box-shadow:0 0 15px #ff149322; }
</style>
</head>

<script>
(function() {
  var lastTap = 0;
  function noDouble(e) {
    if (e && e.type === 'touchstart') { e.preventDefault(); lastTap = Date.now(); return true; }
    if (e && e.type === 'click' && Date.now() - lastTap < 500) return false;
    return true;
  }

  // ==== AUDIO ENGINE ====
  var actx = null;
  function getCtx() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
    if (actx && actx.state === 'suspended') actx.resume();
    return actx;
  }

  // -- DRUM SOUNDS --
  function playDrum(type) {
    var ctx = getCtx(); if (!ctx) return;
    var now = ctx.currentTime, g, osc, noise, buf, data, f, g2;
    if (type === 0) { // crash
      noise = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.5, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,1.2)*0.5;
      noise.buffer=buf; g=ctx.createGain(); g.gain.setValueAtTime(0.6,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
      noise.connect(g); g.connect(ctx.destination); noise.start(now);
    } else if (type === 1) { // ride
      noise = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.2, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,3)*0.35;
      noise.buffer=buf; g=ctx.createGain(); g.gain.setValueAtTime(0.4,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=4000;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start(now);
    } else if (type === 2) { // hihat
      noise = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.05, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,6)*0.5;
      noise.buffer=buf; g=ctx.createGain(); g.gain.setValueAtTime(0.5,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.05);
      f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=6000;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start(now);
    } else if (type === 3) { // tom hi
      osc=ctx.createOscillator(); osc.frequency.setValueAtTime(200,now); osc.frequency.exponentialRampToValueAtTime(80,now+0.15);
      g=ctx.createGain(); g.gain.setValueAtTime(0.6,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+0.15);
    } else if (type === 4) { // snare
      noise = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.12, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,3)*0.7;
      noise.buffer=buf; g=ctx.createGain(); g.gain.setValueAtTime(0.8,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=1500;
      noise.connect(f); f.connect(g); g.connect(ctx.destination); noise.start(now);
      osc=ctx.createOscillator(); osc.frequency.setValueAtTime(180,now); osc.frequency.exponentialRampToValueAtTime(60,now+0.06);
      g2=ctx.createGain(); g2.gain.setValueAtTime(0.4,now); g2.gain.exponentialRampToValueAtTime(0.001,now+0.06);
      osc.connect(g2); g2.connect(ctx.destination); osc.start(now); osc.stop(now+0.06);
    } else if (type === 5) { // tom lo
      osc=ctx.createOscillator(); osc.frequency.setValueAtTime(120,now); osc.frequency.exponentialRampToValueAtTime(50,now+0.2);
      g=ctx.createGain(); g.gain.setValueAtTime(0.6,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+0.2);
    } else { // kick
      osc=ctx.createOscillator(); osc.frequency.setValueAtTime(160,now); osc.frequency.exponentialRampToValueAtTime(30,now+0.15);
      g=ctx.createGain(); g.gain.setValueAtTime(1.0,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+0.2);
      noise = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.02, ctx.sampleRate); data = buf.getChannelData(0);
      for (var i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,10)*0.3;
      noise.buffer=buf; g2=ctx.createGain(); g2.gain.setValueAtTime(0.3,now); g2.gain.exponentialRampToValueAtTime(0.001,now+0.02);
      noise.connect(g2); g2.connect(ctx.destination); noise.start(now);
    }
  }

  // ==== BACKING TRACK ENGINE (bass + distorted guitar, NO drums) ====
  var backingNodes = [];
  var backingTimer = null;

  function stopBacking() {
    for (var i=0; i<backingNodes.length; i++) { try{backingNodes[i].stop();}catch(e){} try{backingNodes[i].disconnect();}catch(e){} }
    backingNodes = [];
    if (backingTimer) { clearInterval(backingTimer); backingTimer = null; }
  }

  var NF = { // note frequencies
    'C2':65.41,'D2':73.42,'E2':82.41,'F2':87.31,'G2':98,'A2':110,'B2':123.47,
    'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196,'A3':220,'B3':246.94,
    'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392,'A4':440,'B4':493.88,
    'C5':523.25,'E5':659.25,'G5':783.99,
    'Db2':69.30,'Eb2':77.78,'Gb2':92.50,'Ab2':103.83,'Bb2':116.54,
    'Db3':138.59,'Eb3':155.56,'Gb3':185,'Ab3':207.65,'Bb3':233.08,
    'Db4':277.18,'Eb4':311.13,'Gb4':369.99,'Ab4':415.30,'Bb4':466.16
  };

  function schedBass(ctx, freq, start, dur) {
    var osc = ctx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, start);
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.22, start);
    g.gain.setValueAtTime(0.22, start + dur * 0.7);
    g.gain.linearRampToValueAtTime(0, start + dur);
    var filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 600;
    osc.connect(filt); filt.connect(g); g.connect(ctx.destination);
    osc.start(start); osc.stop(start + dur + 0.01);
    backingNodes.push(osc);
  }

  function schedGuitar(ctx, freqs, start, dur) {
    for (var i = 0; i < freqs.length; i++) {
      var osc = ctx.createOscillator(); osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freqs[i], start);
      // Distortion via waveshaper
      var ws = ctx.createWaveShaper();
      var curve = new Float32Array(256);
      for (var j=0; j<256; j++) { var x=(j/128)-1; curve[j]=(Math.PI+4)*x/(Math.PI+4*Math.abs(x)); }
      ws.curve = curve;
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.06, start);
      g.gain.setValueAtTime(0.06, start + dur * 0.85);
      g.gain.linearRampToValueAtTime(0, start + dur);
      var filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 3000;
      osc.connect(ws); ws.connect(filt); filt.connect(g); g.connect(ctx.destination);
      osc.start(start); osc.stop(start + dur + 0.01);
      backingNodes.push(osc);
    }
  }

  function startBacking(songIdx) {
    stopBacking();
    var ctx = getCtx(); if (!ctx) return;
    var song = songs[songIdx];
    var bpm = song.bpm;
    var beatDur = 60 / bpm;
    var measureDur = beatDur * 4;
    var now = ctx.currentTime + 0.15;
    var chords = song.chords;
    // Schedule enough backing for the full song + loop buffer
    var totalMeasures = Math.ceil((song.duration + 5000) / 1000 / measureDur);

    for (var m = 0; m < totalMeasures; m++) {
      var ch = chords[m % chords.length];
      var mStart = now + m * measureDur;
      var bassFreq = NF[ch.b] || 100;
      var gFreqs = [];
      for (var c = 0; c < ch.g.length; c++) gFreqs.push(NF[ch.g[c]] || 300);

      // Bass: 8th note punk root
      for (var b = 0; b < 8; b++) {
        var t = mStart + b * beatDur * 0.5;
        schedBass(ctx, bassFreq, t, beatDur * 0.45);
      }
      // Guitar: downstrokes on beats + upstrokes on &'s
      for (var b = 0; b < 4; b++) {
        schedGuitar(ctx, gFreqs, mStart + b * beatDur, beatDur * 0.85);
        schedGuitar(ctx, gFreqs, mStart + b * beatDur + beatDur * 0.5, beatDur * 0.3);
      }
    }
  }

  // ==== SONG DATA ====

  var curSong = 0;
  var jamStart = 0;
  var jamRunning = false;
  var lyricIdx = 0;

  // ==== UI ====
  window.pickSong = function(e, idx) {
    if (!noDouble(e)) return;
    playDrum(2);
    var btns = document.querySelectorAll('.song-item');
    for (var i = 0; i < btns.length; i++) btns[i].className = 'song-item';
    btns[idx].className = 'song-item sel';
    curSong = idx;
  };

  window.startJam = function(e) {
    if (!noDouble(e)) return;
    playDrum(0); // crash to unlock audio
    startBacking(curSong);
    document.getElementById('songName').textContent = songs[curSong].name;
    document.getElementById('musicStatus').textContent = '♪ BASS + GUITAR PLAYING — YOU BRING THE DRUMS!';
    lyricIdx = 0;
    jamStart = Date.now();
    jamRunning = true;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('playScreen').style.display = 'flex';
    updateLyrics();
  };

  window.restartSong = function(e) {
    if (!noDouble(e)) return;
    stopBacking();
    startBacking(curSong);
    jamStart = Date.now();
    lyricIdx = 0;
    playDrum(0);
  };

  window.goBack = function(e) {
    if (!noDouble(e)) return;
    jamRunning = false;
    stopBacking();
    document.getElementById('playScreen').style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
  };

  function updateLyrics() {
    if (!jamRunning) return;
    var elapsed = Date.now() - jamStart;
    var lyr = songs[curSong].lyrics;
    while (lyricIdx < lyr.length - 1 && elapsed >= lyr[lyricIdx + 1][0]) lyricIdx++;
    document.getElementById('lyricLine').textContent = lyr[lyricIdx][1];
    var next = (lyricIdx + 1 < lyr.length && lyr[lyricIdx+1][1]) ? lyr[lyricIdx+1][1] : '';
    document.getElementById('lyricNext').textContent = next;
    // Loop when song ends
    if (lyricIdx >= lyr.length - 1 && elapsed > lyr[lyr.length-1][0] + 3000) {
      stopBacking(); startBacking(curSong);
      jamStart = Date.now(); lyricIdx = 0;
    }
    requestAnimationFrame(updateLyrics);
  }

  // ==== DRUM TAPS ====
  var drums = document.querySelectorAll('.drum');
  for (var i = 0; i < drums.length; i++) {
    (function(el) {
      var dt = parseInt(el.getAttribute('data-d'));
      el.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); hitDrum(el, dt); }, { passive: false });
      el.addEventListener('mousedown', function(e) { e.preventDefault(); hitDrum(el, dt); });
    })(drums[i]);
  }

  function hitDrum(el, type) {
    playDrum(type);
    el.classList.add('hit');
    setTimeout(function() { el.classList.remove('hit'); }, 100);
  }

  // Keyboard
  var keyMap = {'a':0,'s':1,'d':2,'f':3,'g':4,'h':5,' ':6};
  document.addEventListener('keydown', function(e) {
    var t = keyMap[e.key.toLowerCase()];
    if (t !== undefined) { e.preventDefault(); hitDrum(document.querySelector('[data-d="'+t+'"]'), t); }
  });
})();
