<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DRUM LIKE BARKER</title>
<script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" data-web-components async></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#000; color:#fff; font-family:'Courier New',monospace;
    overflow:hidden; height:100vh; width:100vw;
    touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }

  /* MENU */
  #menu {
    position:fixed; inset:0; background:#000; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:100; text-align:center; padding:15px;
    overflow-y:auto;
    background-image: repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,20,147,0.03) 40px,rgba(255,20,147,0.03) 41px),
      repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,20,147,0.03) 40px,rgba(255,20,147,0.03) 41px);
  }
  .smiley { font-size:8vw; margin-bottom:2px; }
  .blink-logo {
    font-family:'Permanent Marker',cursive; font-size:10vw; color:#ff1493; letter-spacing:-2px;
    text-shadow:3px 3px 0 #000,-1px -1px 0 #ff1493,0 0 30px #ff149366; transform:rotate(-2deg);
  }
  .blink-sub { font-family:'Permanent Marker',cursive; font-size:4vw; color:#fff; letter-spacing:2px; transform:rotate(1deg); margin-bottom:5px; }
  .blink-ded { font-family:'Permanent Marker',cursive; font-size:5vw; color:#ffcc00; margin-bottom:12px; transform:rotate(-1deg); text-shadow:2px 2px 0 #000; }
  .song-list { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; width:88%; max-width:360px; }
  .song-item {
    background:none; border:2px solid #ff1493; color:#ff1493;
    font-family:'Permanent Marker',cursive; font-size:3.5vw;
    padding:10px 14px; -webkit-appearance:none; border-radius:0; cursor:pointer;
    text-align:left; letter-spacing:1px; transition:all 0.15s;
  }
  .song-item:active,.song-item.sel { background:#ff1493; color:#000; box-shadow:0 0 15px #ff149388; }
  .go-btn {
    background:#ff1493; border:none; color:#000;
    font-family:'Permanent Marker',cursive; font-size:6vw;
    padding:12px 40px; letter-spacing:4px; -webkit-appearance:none;
    border-radius:0; cursor:pointer; box-shadow:4px 4px 0 #fff; transform:rotate(-1deg);
  }
  .go-btn:active { transform:rotate(-1deg) scale(0.95); box-shadow:2px 2px 0 #fff; }
  .instructions { font-size:2.5vw; color:#fff; max-width:320px; line-height:1.5; margin-top:8px; }
  .instructions strong { color:#fff; font-family:'Permanent Marker',cursive; }

  /* PLAY SCREEN */
  #playScreen { display:none; position:fixed; inset:0; flex-direction:column; background:#000; }

  /* Top bar: lyrics + controls */
  #topBar {
    height:auto; min-height:120px; position:relative;
    background:linear-gradient(to bottom,#111,#000);
    border-bottom:2px solid #ff1493;
    display:flex; flex-direction:column;
    padding:44px 12px 8px 12px;
  }
  #songName { font-family:'Permanent Marker',cursive; font-size:3vw; color:#ff1493; text-shadow:0 0 10px #ff149366; }
  #mkStatus { font-family:'Permanent Marker',cursive; font-size:2.5vw; color:#00ff88; text-align:center; margin:4px 0; }
  #lyricLine { font-family:'Permanent Marker',cursive; font-size:4.5vw; color:#fff; min-height:2em; line-height:1.3; margin-top:4px; transition:opacity 0.2s; }
  #lyricNext { font-size:2.5vw; color:#555; min-height:1.2em; margin-top:2px; }
  #topBtns { position:absolute; top:6px; right:8px; display:flex; gap:6px; z-index:10; }
  .sync-btn { background:#00ff88 !important; }
  .top-btn {
    background:#ff1493; border:none; color:#000;
    font-family:'Permanent Marker',cursive; font-size:3.5vw;
    padding:8px 16px; -webkit-appearance:none; border-radius:0; cursor:pointer;
    box-shadow:2px 2px 0 #fff;
  }
  #musicStatus { position:absolute; bottom:4px; right:8px; font-family:'Permanent Marker',cursive; font-size:2vw; color:#00ff88; }

  /* Drum kit */
  #drumKit {
    flex:1; display:grid; padding:6px; gap:5px;
    grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr;
    grid-template-areas: "crash ride hihat" "tom1 snare tom2" "kick kick kick";
    background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,20,147,0.02) 10px,rgba(255,20,147,0.02) 11px);
  }
  .drum {
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    flex-direction:column; cursor:pointer; position:relative; overflow:hidden;
    transition:transform 0.05s; border:3px solid;
  }
  .drum:active,.drum.hit { transform:scale(0.88); }
  .drum .name { font-family:'Permanent Marker',cursive; font-size:3.8vw; letter-spacing:1px; text-shadow:0 0 15px currentColor,2px 2px 0 rgba(0,0,0,0.8); pointer-events:none; z-index:2; }
  .drum .sub-name { font-size:2vw; opacity:0.5; pointer-events:none; z-index:2; font-family:'Permanent Marker',cursive; }
  .drum .flash { position:absolute; inset:0; background:radial-gradient(circle,rgba(255,255,255,0.6) 0%,transparent 70%); opacity:0; transition:opacity 0.08s; pointer-events:none; }
  .drum.hit .flash { opacity:1; }
  #crash { grid-area:crash; background:radial-gradient(circle,#332200,#0f0a00); color:#ffcc00; border-color:#ffcc00; }
  #ride  { grid-area:ride;  background:radial-gradient(circle,#2a2a0a,#0f0f00); color:#dddd33; border-color:#dddd33; }
  #hihat { grid-area:hihat; background:radial-gradient(circle,#002233,#000a11); color:#00d4ff; border-color:#00d4ff; }
  #tom1  { grid-area:tom1;  background:radial-gradient(circle,#1a0033,#080015); color:#aa44ff; border-color:#aa44ff; }
  #snare { grid-area:snare; background:radial-gradient(circle,#33001a,#150008); color:#ff1493; border-color:#ff1493; box-shadow:0 0 20px #ff149344; }
  #tom2  { grid-area:tom2;  background:radial-gradient(circle,#002a00,#000f00); color:#00ff88; border-color:#00ff88; }
  #kick  { grid-area:kick;  background:radial-gradient(circle,#1a1a1a,#050505); color:#fff; border-color:#ff1493; border-radius:20px; box-shadow:0 0 15px #ff149322; }
</style>
</head>
<body>

<div id="menu">
  <div class="smiley">:)</div>
  <div class="blink-logo">DRUM LIKE BARKER</div>
  <div class="blink-sub">A BLINK-182 JAM SESSION</div>
  <div class="blink-ded">CAMERON - SHOW US WHAT YOU GOT</div>
  <div class="song-list">
    <button class="song-item sel" ontouchstart="pickSong(event,0)" onclick="pickSong(event,0)">ALL THE SMALL THINGS</button>
    <button class="song-item" ontouchstart="pickSong(event,1)" onclick="pickSong(event,1)">WHAT'S MY AGE AGAIN?</button>
    <button class="song-item" ontouchstart="pickSong(event,2)" onclick="pickSong(event,2)">DAMMIT</button>
    <button class="song-item" ontouchstart="pickSong(event,3)" onclick="pickSong(event,3)">FEELING THIS</button>
    <button class="song-item" ontouchstart="pickSong(event,4)" onclick="pickSong(event,4)">ONE MORE TIME</button>
  </div>
  <button class="go-btn" ontouchstart="startJam(event)" onclick="startJam(event)">LET'S GO!</button>
  <div class="instructions">
    <strong>HOW TO PLAY:</strong><br>
    1. Pick a song & hit LET'S GO<br>
    2. The real track plays automatically<br>
    3. YOU are Travis Barker — bring the beat!<br>
    4. Use SYNC if lyrics drift 🤘
  </div>
</div>

<div id="playScreen">
  <div id="topBar">
    <div id="topBtns">
      <button class="top-btn sync-btn" ontouchstart="syncLyrics(event)" onclick="syncLyrics(event)">⇆ SYNC</button>
      <button class="top-btn" ontouchstart="restartSong(event)" onclick="restartSong(event)">↺ RESTART</button>
      <button class="top-btn" ontouchstart="goBack(event)" onclick="goBack(event)">🎵 PICK SONG</button>
    </div>
    <div id="songName"></div>
    <div id="mkStatus"></div>
    <div id="lyricLine"></div>
    <div id="lyricNext"></div>
    <div id="musicStatus"></div>
  </div>
  <div id="drumKit">
    <div class="drum" id="crash" data-d="0"><div class="flash"></div><div class="name">CRASH</div></div>
    <div class="drum" id="ride"  data-d="1"><div class="flash"></div><div class="name">RIDE</div></div>
    <div class="drum" id="hihat" data-d="2"><div class="flash"></div><div class="name">HI-HAT</div></div>
    <div class="drum" id="tom1"  data-d="3"><div class="flash"></div><div class="name">TOM 1</div><div class="sub-name">HIGH</div></div>
    <div class="drum" id="snare" data-d="4"><div class="flash"></div><div class="name">SNARE</div></div>
    <div class="drum" id="tom2"  data-d="5"><div class="flash"></div><div class="name">TOM 2</div><div class="sub-name">LOW</div></div>
    <div class="drum" id="kick"  data-d="6"><div class="flash"></div><div class="name">KICK</div></div>
  </div>
</div>

<script>
// NO IIFE — all globals so inline handlers work on iOS
var actx = null;
var backingTimer = null;
var backingMeasure = 0;
var backingStartTime = 0;
var backingBus = null;
var lastTap = 0;
var mkInstance = null;
var mkReady = false;
function dbg(msg) { /* debug removed */ }

// Force Safari "playback" audio session (overrides silent switch on iOS)
// Method 1: Set webkit audio category directly
// Method 2: Play looping silent <audio> element to force playback session
// Method 3: Use audioSession API (iOS 16.4+)

// Generate a short silent WAV as base64 (44 bytes header + 2 bytes silence)
var silentB64 = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYoRwmHAAAAAAD/+1DEAAAGAAGf9AAAIi2Kcz80AAQAAIA/5c5OIKBh8uf/BwMf8uD58H3+XB9+D4f/y4P/+D7///y5///B8EAQBA0ggCAIeuD4Pv///8QBB3/EAQBA0CAAAADQ0JBQYSEBMYRlpvdvdX19fGhFEQIGDI7/+1DEHQPAAAGkAAAAIAAANIAAAARBkdkclMpNBodEvKimRKSmRv//WjmRIkRNMRT//6aaGYmJT////WiYmGImJ//9aNDERBEQQRXb//11b6WlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpf/7UsQxA8AAAaQAAAAgAAA0gAAABKWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpaWlpa';
var audioEl = null;
function unlockSilentSwitch() {
  if (audioEl) return;
  try {
    audioEl = new Audio(silentB64);
    audioEl.loop = true;
    audioEl.volume = 0.01; // near-silent but not zero
    audioEl.play().catch(function(){});
  } catch(e) {}
}

// Create or get AudioContext — MUST be called in user gesture call stack
function getCtx() {
  unlockSilentSwitch();
  if (!actx) {
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      actx = new AC();
      // iOS 16.4+ audioSession API to force playback mode
      if (navigator.audioSession) {
        navigator.audioSession.type = 'playback';
        dbg('audioSession=playback | ctx=' + actx.state);
      } else if (actx.audioSession) {
        actx.audioSession.type = 'playback';
        dbg('ctx.audioSession=playback | ctx=' + actx.state);
      } else {
        dbg('NO audioSession API | ctx=' + actx.state + ' sr=' + actx.sampleRate);
      }
    } catch(e) {
      dbg('AudioContext FAILED: ' + e.message);
      return null;
    }
  }
  if (actx.state === 'suspended') {
    actx.resume();
  }
  return actx;
}

// Prevent double-fire from touchstart+click
function noDouble(e) {
  if (e && e.type === 'touchstart') { e.preventDefault(); lastTap = Date.now(); return true; }
  if (e && e.type === 'click' && Date.now() - lastTap < 500) return false;
  return true;
}

// ==== DRUM SOUNDS ====
function playDrum(type) {
  var ctx = getCtx(); if (!ctx) { dbg('NO CTX for drum ' + type); return; }
  dbg('DRUM ' + type + ' | ctx.state=' + ctx.state + ' time=' + ctx.currentTime.toFixed(2));
  var D = ctx.destination, now = ctx.currentTime, g, o, n, buf, d, f, g2;

  if (type === 0) { // crash
    n = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.5|0, ctx.sampleRate); d = buf.getChannelData(0);
    for (var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2)*0.8;
    n.buffer=buf; g=ctx.createGain(); g.gain.setValueAtTime(1.0,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
    n.connect(g); g.connect(D); n.start(now);
  } else if (type === 1) { // ride
    n = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.2|0, ctx.sampleRate); d = buf.getChannelData(0);
    for (var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3)*0.6;
    n.buffer=buf; g=ctx.createGain(); g.gain.setValueAtTime(0.7,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=3500;
    n.connect(f); f.connect(g); g.connect(D); n.start(now);
  } else if (type === 2) { // hihat
    n = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.06|0, ctx.sampleRate); d = buf.getChannelData(0);
    for (var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,5)*0.8;
    n.buffer=buf; g=ctx.createGain(); g.gain.setValueAtTime(0.8,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
    f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=5000;
    n.connect(f); f.connect(g); g.connect(D); n.start(now);
  } else if (type === 3) { // tom hi
    o=ctx.createOscillator(); o.frequency.setValueAtTime(220,now); o.frequency.exponentialRampToValueAtTime(80,now+0.15);
    g=ctx.createGain(); g.gain.setValueAtTime(1.0,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    o.connect(g); g.connect(D); o.start(now); o.stop(now+0.16);
  } else if (type === 4) { // snare
    n = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.12|0, ctx.sampleRate); d = buf.getChannelData(0);
    for (var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);
    n.buffer=buf; g=ctx.createGain(); g.gain.setValueAtTime(1.0,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
    f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=1200;
    n.connect(f); f.connect(g); g.connect(D); n.start(now);
    o=ctx.createOscillator(); o.frequency.setValueAtTime(200,now); o.frequency.exponentialRampToValueAtTime(60,now+0.07);
    g2=ctx.createGain(); g2.gain.setValueAtTime(0.7,now); g2.gain.exponentialRampToValueAtTime(0.001,now+0.07);
    o.connect(g2); g2.connect(D); o.start(now); o.stop(now+0.08);
  } else if (type === 5) { // tom lo
    o=ctx.createOscillator(); o.frequency.setValueAtTime(140,now); o.frequency.exponentialRampToValueAtTime(45,now+0.2);
    g=ctx.createGain(); g.gain.setValueAtTime(1.0,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    o.connect(g); g.connect(D); o.start(now); o.stop(now+0.21);
  } else { // kick
    o=ctx.createOscillator(); o.frequency.setValueAtTime(160,now); o.frequency.exponentialRampToValueAtTime(30,now+0.15);
    g=ctx.createGain(); g.gain.setValueAtTime(1.0,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    o.connect(g); g.connect(D); o.start(now); o.stop(now+0.21);
    n = ctx.createBufferSource(); buf = ctx.createBuffer(1, ctx.sampleRate*0.02|0, ctx.sampleRate); d = buf.getChannelData(0);
    for (var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,8)*0.5;
    n.buffer=buf; g2=ctx.createGain(); g2.gain.setValueAtTime(0.5,now); g2.gain.exponentialRampToValueAtTime(0.001,now+0.02);
    n.connect(g2); g2.connect(D); n.start(now);
  }
}

// ==== BACKING TRACK ENGINE ====
var NF = {
  'C2':65.41,'D2':73.42,'E2':82.41,'F2':87.31,'G2':98,'A2':110,'B2':123.47,
  'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196,'A3':220,'B3':246.94,
  'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392,'A4':440,'B4':493.88,
  'C5':523.25,'E5':659.25,'G5':783.99,
  'Db2':69.30,'Eb2':77.78,'Gb2':92.50,'Ab2':103.83,'Bb2':116.54,
  'Db3':138.59,'Eb3':155.56,'Gb3':185,'Ab3':207.65,'Bb3':233.08,
  'Db4':277.18,'Eb4':311.13,'Gb4':369.99,'Ab4':415.30,'Bb4':466.16
};

var distCurve = new Float32Array(256);
for (var j=0;j<256;j++){var x=(j/128)-1; distCurve[j]=(Math.PI+4)*x/(Math.PI+4*Math.abs(x));}

function schedMeasure(ctx, song, mIdx, mStart) {
  var bus = backingBus || ctx.destination;
  var beatDur = 60 / song.bpm;
  var ch = song.chords[mIdx % song.chords.length];
  var bassFreq = NF[ch.b] || 100;
  var gFreqs = [];
  for (var c=0; c<ch.g.length; c++) gFreqs.push(NF[ch.g[c]] || 300);

  // Bass: 8th notes
  for (var b=0; b<8; b++) {
    var t = mStart + b * beatDur * 0.5;
    var dur = beatDur * 0.4;
    var osc = ctx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(bassFreq, t);
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.2, t);
    g.gain.linearRampToValueAtTime(0, t + dur);
    var filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 600;
    osc.connect(filt); filt.connect(g); g.connect(bus);
    osc.start(t); osc.stop(t + dur + 0.01);
  }

  // Guitar: quarter note power chords
  for (var b=0; b<4; b++) {
    var t = mStart + b * beatDur;
    var dur = beatDur * 0.8;
    for (var i=0; i<gFreqs.length; i++) {
      var osc = ctx.createOscillator(); osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(gFreqs[i], t);
      var ws = ctx.createWaveShaper(); ws.curve = distCurve;
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.07, t);
      g.gain.linearRampToValueAtTime(0, t + dur);
      osc.connect(ws); ws.connect(g); g.connect(bus);
      osc.start(t); osc.stop(t + dur + 0.01);
    }
  }

  // Vocal synth: melody line following chord tones, octave up, with vibrato
  // Pattern per measure: root, fifth, third, fifth (half-notes on beats 1,2,3,4)
  var melodyPattern = [gFreqs[0], gFreqs[2], gFreqs[1], gFreqs[2]];
  for (var b=0; b<4; b++) {
    var t = mStart + b * beatDur;
    var dur = beatDur * 0.85;
    var f0 = melodyPattern[b] * 2; // octave up into vocal range
    // Triangle oscillator with bandpass filter for formant-ish "aah" vowel
    var vOsc = ctx.createOscillator(); vOsc.type = 'triangle';
    vOsc.frequency.setValueAtTime(f0, t);
    // Vibrato LFO
    var lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 5.5;
    var lfoGain = ctx.createGain(); lfoGain.gain.value = f0 * 0.015;
    lfo.connect(lfoGain); lfoGain.connect(vOsc.frequency);
    // Formant filter
    var bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
    bp.frequency.value = 900; bp.Q.value = 4;
    // Envelope
    var vg = ctx.createGain();
    vg.gain.setValueAtTime(0.0001, t);
    vg.gain.exponentialRampToValueAtTime(0.14, t + 0.04);
    vg.gain.setValueAtTime(0.14, t + dur * 0.7);
    vg.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    vOsc.connect(bp); bp.connect(vg); vg.connect(bus);
    vOsc.start(t); vOsc.stop(t + dur + 0.02);
    lfo.start(t); lfo.stop(t + dur + 0.02);
  }
}

function stopBacking() {
  if (backingTimer) { clearInterval(backingTimer); backingTimer = null; }
  // Hard-cut all scheduled audio by ramping bus to 0 and disconnecting
  if (backingBus && actx) {
    try {
      var now = actx.currentTime;
      backingBus.gain.cancelScheduledValues(now);
      backingBus.gain.setValueAtTime(backingBus.gain.value, now);
      backingBus.gain.linearRampToValueAtTime(0, now + 0.03);
      var oldBus = backingBus;
      setTimeout(function(){ try { oldBus.disconnect(); } catch(e){} }, 80);
    } catch(e) {}
    backingBus = null;
  }
  // DO NOT close AudioContext — drums need it to keep working
}

function startBacking(songIdx) {
  // Synth backing disabled — Apple Music iframe provides the backing track
  stopBacking();
}

var curSong = 0;
var jamStart = 0;
var jamRunning = false;
var lyricIdx = 0;
var awaitingPlay = false;

// ==== UI ====
// ==== MUSICKIT INIT ====
var MK_TOKEN = 'eyJhbGciOiJFUzI1NiIsImtpZCI6IkczVlM0Mzg0UTYifQ.eyJpc3MiOiI5RlY3SDVTOEg2IiwiaWF0IjoxNzc1NTA1ODk5LCJleHAiOjE3OTEwNTc4OTl9.PEo8K8aobTS9ENfAh7KXkz-3Y5an3Lc_XPhYF7KQz2z0mXIuAy5zyEXIgMZ-F-ZIIF8SVeA70sMUS8l3izhDVg';

function initMusicKit() {
  if (mkInstance) return Promise.resolve(mkInstance);
  return MusicKit.configure({
    developerToken: MK_TOKEN,
    app: { name: 'Drum Like Barker', build: '1.0' }
  }).then(function() {
    mkInstance = MusicKit.getInstance();
    mkReady = true;
    return mkInstance;
  });
}

function mkPlay(song) {
  var st = document.getElementById('mkStatus');
  if (st) st.textContent = 'Loading track...';
  return initMusicKit().then(function(mk) {
    return mk.setQueue({ song: String(song.am.track) });
  }).then(function() {
    if (st) st.textContent = '♪ PLAYING — DRUM ALONG!';
    return mkInstance.play();
  }).then(function() {
    // Auto-start lyrics when playback actually begins
    jamStart = Date.now();
    lyricIdx = 0;
    awaitingPlay = false;
  }).catch(function(err) {
    if (st) st.textContent = 'Music error: ' + err.message;
  });
}

function mkStop() {
  if (mkInstance) {
    try { mkInstance.stop(); } catch(e) {}
  }
}
function pickSong(e, idx) {
  if (!noDouble(e)) return;
  getCtx(); // create AudioContext on first interaction
  playDrum(2);
  var btns = document.querySelectorAll('.song-item');
  for (var i = 0; i < btns.length; i++) btns[i].className = 'song-item';
  btns[idx].className = 'song-item sel';
  curSong = idx;
}

function startJam(e) {
  if (!noDouble(e)) return;
  var ctx = getCtx();
  if (ctx) ctx.resume();
  playDrum(0);
  document.getElementById('songName').textContent = songs[curSong].name;
  document.getElementById('musicStatus').textContent = '';
  lyricIdx = 0;
  jamStart = Date.now() + 999999;
  awaitingPlay = true;
  jamRunning = true;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('playScreen').style.display = 'flex';
  updateLyrics();
  mkPlay(songs[curSong]);
}

function syncLyrics(e) {
  if (!noDouble(e)) return;
  jamStart = Date.now();
  lyricIdx = 0;
  awaitingPlay = false;
  var ms = document.getElementById('musicStatus');
  if (ms) ms.textContent = '♪ PLAYING — DRUM ALONG!';
}

function restartSong(e) {
  if (!noDouble(e)) return;
  stopBacking();
  mkStop();
  var ctx = getCtx();
  if (ctx) ctx.resume();
  jamStart = Date.now() + 999999;
  awaitingPlay = true;
  lyricIdx = 0;
  playDrum(0);
  mkPlay(songs[curSong]);
}

function goBack(e) {
  if (!noDouble(e)) return;
  jamRunning = false;
  stopBacking();
  mkStop();
  document.getElementById('playScreen').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}

function updateLyrics() {
  if (!jamRunning) return;
  var elapsed = Date.now() - jamStart;
  var lyr = songs[curSong].lyrics;
  while (lyricIdx < lyr.length - 1 && elapsed >= lyr[lyricIdx + 1][0]) lyricIdx++;
  document.getElementById('lyricLine').textContent = lyr[lyricIdx][1];
  var next = (lyricIdx + 1 < lyr.length && lyr[lyricIdx+1][1]) ? lyr[lyricIdx+1][1] : '';
  document.getElementById('lyricNext').textContent = next;
  // Lyrics no longer auto-loop; Apple Music controls the track
  requestAnimationFrame(updateLyrics);
}

// ==== DRUM TAPS ====
function hitDrum(el, type) {
  getCtx(); // ensure context exists in this gesture
  playDrum(type);
  el.classList.add('hit');
  setTimeout(function() { el.classList.remove('hit'); }, 100);
}

// Attach drum touch/click handlers
document.addEventListener('DOMContentLoaded', function() {
  var drums = document.querySelectorAll('.drum');
  for (var i = 0; i < drums.length; i++) {
    (function(el) {
      var dt = parseInt(el.getAttribute('data-d'));
      el.addEventListener('touchstart', function(e) {
        e.preventDefault();
        hitDrum(el, dt);
      }, { passive: false });
      el.addEventListener('mousedown', function(e) {
        e.preventDefault();
        hitDrum(el, dt);
      });
    })(drums[i]);
  }
});

// Keyboard support
var keyMap = {'a':0,'s':1,'d':2,'f':3,'g':4,'h':5,' ':6};
document.addEventListener('keydown', function(e) {
  var t = keyMap[e.key.toLowerCase()];
  if (t !== undefined) { e.preventDefault(); hitDrum(document.querySelector('[data-d="'+t+'"]'), t); }
});
</script>
